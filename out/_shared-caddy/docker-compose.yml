# Generated by provision/centralized.py — SHARED Caddy for multi-Cove on one box.
# ONE per machine. Owns 80/443, routes every Cove by container name over lucidcove-net.
# Brought up by install.sh (idempotent). Per-Cove routing lives in conf.d/*.caddy.
name: lucidcove-shared

services:
  caddy:
    build:
      context: ${COVE_CORE:?set COVE_CORE to the cove-core repo path}/docker/caddy
      dockerfile: Dockerfile
    image: lucid-cove-caddy:latest
    container_name: lucidcove-caddy
    restart: unless-stopped
    networks:
      - lucidcove-net
    environment:
      # #D35: the token that gates the bridge-facing admin proxy. Read from a .env
      # beside this compose (LP_CADDY_ADMIN_TOKEN=...). Empty default = the gate is
      # off (the #D32 bridge admin is used) so this is inert until the token is set.
      - LP_CADDY_ADMIN_TOKEN=${LP_CADDY_ADMIN_TOKEN:-}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - ./conf.d:/etc/caddy/conf.d:ro
      - caddy_data:/data
      - caddy_config:/config
    ports:
      - "80:80"
      - "443:443"

volumes:
  caddy_data:
  caddy_config:

networks:
  lucidcove-net:
    external: true
