version: 2

global:
  server_name: matrix.lucidcove-5680923f5af57bc3.localhost
  private_key: /var/dendrite/matrix_key.pem   # generated on first boot (data volume)
  key_validity_period: 168h0m0s

  database:
    connection_string: postgresql://dendrite:8GeKmY3FPggt5iDAIufS6dgJxRde05os@postgres:5432/dendrite?sslmode=disable
    max_open_conns: 90
    max_idle_conns: 5
    conn_max_lifetime: -1

  cache:
    max_size_estimated: 1073741824  # 1GB
    max_age: 1h

  jetstream:
    storage_path: /var/dendrite/jetstream
    in_memory: false
    topic_prefix: Dendrite

  metrics:
    enabled: false

  dns_cache:
    enabled: true
    cache_size: 256
    cache_lifetime: 5m

client_api:
  registration_disabled: true
  registration_shared_secret: "Wky7cPsm-lSXsjmI0NNRqiNqehbbcuqbJOnwavqtIqs"
  rate_limiting:
    enabled: true
    threshold: 20
    cooloff_ms: 500
    exempt_user_ids:
      - "@stuart:matrix.lucidcove-5680923f5af57bc3.localhost"
      - "@agent:matrix.lucidcove-5680923f5af57bc3.localhost"
      - "@lt:matrix.lucidcove-5680923f5af57bc3.localhost"
      - "@mercer:matrix.lucidcove-5680923f5af57bc3.localhost"
      - "@archimedes:matrix.lucidcove-5680923f5af57bc3.localhost"
