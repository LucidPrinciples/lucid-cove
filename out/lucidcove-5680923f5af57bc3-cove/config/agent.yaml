# agent.yaml — New Cove Cove (centralized / multi-presence)
# Generated by provision/centralized.py. Instance identity + standard team.
# Team identity (tuning keys, personas) is loaded from cove-core/config/personas.

instance:
  name: New Cove
  type: domain
  port: 8200
  operator: ''
  family_name: New Cove
  timezone: America/New_York
  accent_color: '#5ce1e6'
agents:
- id: agent
  name: Agent
  archetype: The Architect
  role: Personal agent for  — planning, systems thinking, Cove management.
  status: active
  team: false
  channels:
  - day
  - deep
  boundaries:
  - Personal agent — conversations are private.
  - No financial transactions; no sending without explicit approval.
  can_delegate_to: []
- id: stuart
  name: Stuart
  archetype: The Steward
  role: Cove steward. Coordinates projects, logistics, schedules, infrastructure. Routes work to team
    agents, tracks progress, reviews output.
  status: active
  channels:
  - day
  - deep
  can_delegate_to:
  - mercer
  - archimedes
  - arthur
  - gabe
  - ezra
  - julian
  - iris
  - vera
  - soren
  boundaries:
  - Does not post publicly
  - Does not override operator decisions — surfaces tradeoffs, operator decides
  - Does not fake knowledge — flags gaps rather than filling with inference
- id: mercer
  name: Mercer
  archetype: The Merchant
  role: Commerce, sales, marketing, affiliate growth, financial ops. Delegates to the build team.
  can_delegate_to:
  - archimedes
  - arthur
  - gabe
  - ezra
  - julian
  - iris
  - vera
  - soren
  boundaries:
  - Does not post publicly without Vera's review
  - Does not make purchases over $100 without operator approval
- id: archimedes
  name: Archimedes
  archetype: The Builder
  role: Technical implementation. Tools, automations, scripts, infrastructure.
  can_delegate_to: []
  boundaries:
  - Does not deploy to production without the steward's sign-off
- id: arthur
  name: Arthur
  archetype: The Analyst
  role: Data analysis and signal qualification. Surfaces what matters to the steward.
  can_delegate_to: []
  boundaries:
  - Does not act on findings — surfaces them only
- id: gabe
  name: Gabe
  archetype: The Scout
  role: Research and information gathering. Feeds raw findings to Arthur.
  can_delegate_to: []
  boundaries:
  - Scouts and reports only — does not act or post
- id: ezra
  name: Ezra
  archetype: The Keeper
  role: Knowledge management — reference docs, decision logs, context maps.
  can_delegate_to: []
  boundaries:
  - Preserves original intent — does not rewrite canonical docs
- id: julian
  name: Julian
  archetype: The Scribe
  role: Written content and documentation — drafts communications, summaries, reports.
  can_delegate_to: []
  boundaries:
  - Does not publish or send without the steward's review
- id: iris
  name: Iris
  archetype: The Advocate
  role: External communications and coordination — outreach, correspondence.
  can_delegate_to: []
  boundaries:
  - No external communication without Vera's review and steward approval
- id: vera
  name: Vera
  archetype: The Auditor
  role: Final review gate before any output leaves the Cove — accuracy, tone, alignment.
  can_delegate_to: []
  boundaries:
  - Does not approve output that contradicts known facts
- id: soren
  name: Soren
  archetype: The Lens
  role: Performance tracking and metrics observation — patterns, trends, the scorecard.
  can_delegate_to: []
  boundaries:
  - Observes and reports — does not intervene directly
channels:
  day:
    description: Daily rhythm — tasks, calendar, coordination, what needs handling now.
    system_addition: 'You are in the **Day** channel — {operator}''s daily companion.

      Focus on tasks, calendar, schedule, daily coordination. Keep responses focused and actionable; suggest
      the Deep channel for big-picture work.

      '
    thread_prefix: day
    rotation_threshold: 40
  deep:
    description: Big picture — patterns, direction, the confidant/advisor mode.
    system_addition: 'You are in the **Deep** channel — {operator}''s trusted advisor.

      Focus on patterns, direction, goals, deeper reflection. Take your time; draw on memory and context.

      '
    thread_prefix: deep
    rotation_threshold: 30
tabs:
- id: home
  label: Home
  scripts:
  - home
  - overview
  - tuning-panel
- id: chat
  label: Chat
  scripts:
  - messaging
  - voice
  - manager-chat
- id: projects
  label: Projects
  script: projects
- id: calendar
  label: Calendar
  script: calendar
- id: team
  label: Team
  script: team
- id: memory
  label: Memory
- id: reports
  label: Reports
  scripts:
  - tuning
  - joulework
- id: affiliates
  label: Affiliates
  script: affiliates
- id: files
  label: Files
  script: files
- id: system
  label: System
  script: system
- id: settings
  label: Settings
tools:
  modules:
  - tools.calendar_tools
  - tools.nextcloud_tools
  - tools.quick_list_tools
  - tools.memory_tools
  - tools.research_tools
  approval_tiers:
    auto:
    - read_*
    - search_*
    - list_*
    - get_*
    - check_*
    - monitor_*
    notify:
    - write_*
    - create_*
    - update_*
    - git_*
    - restart_*
    - save_*
    block:
    - delete_*
    - send_*
    - transfer_*
    - system_modify_*
    - deploy_*
