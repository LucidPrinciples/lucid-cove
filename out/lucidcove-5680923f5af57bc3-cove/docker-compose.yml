# Generated by provision/centralized.py — New Cove (centralized single-stack).
# Copy ../.env.example handling is automatic: secrets are in .env (this folder).
name: lucidcove-5680923f5af57bc3

services:
  postgres:
    image: pgvector/pgvector:pg16@sha256:7d400e340efb42f4d8c9c12c6427adb253f726881a9985d2a471bf0eed824dff
    container_name: lucidcove-5680923f5af57bc3-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - /Users/mymac/Documents/LucidCove/OpenSource/lucid-cove/docker/init-base.sql:/docker-entrypoint-initdb.d/00-base.sql:ro
      - ./docker/init-nextcloud-db.sql:/docker-entrypoint-initdb.d/01-nextcloud.sql:ro
      - ./docker/operator-seed.sql:/docker-entrypoint-initdb.d/02-operator-seed.sql:ro
      - ./docker/init-dendrite-db.sql:/docker-entrypoint-initdb.d/03-dendrite.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  nextcloud:
    image: nextcloud:29-apache@sha256:a7fbfcd4759bdd19b8fb8b1044b47ee3a9471d2e2c8bc68d56a2e671f86cebd2
    container_name: lucidcove-5680923f5af57bc3-nextcloud
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_DB: nextcloud
      POSTGRES_USER: nextcloud
      POSTGRES_PASSWORD: ${NC_DB_PASSWORD}
      NEXTCLOUD_ADMIN_USER: ${NC_ADMIN_USER}
      NEXTCLOUD_ADMIN_PASSWORD: ${NC_ADMIN_PASSWORD}
      NEXTCLOUD_TRUSTED_DOMAINS: "lucidcove-5680923f5af57bc3-nextcloud localhost * ${NEXTCLOUD_TRUSTED_DOMAIN}"
      REDIS_HOST: redis
      PHP_MEMORY_LIMIT: 512M
      PHP_UPLOAD_LIMIT: 512M
    volumes:
      - nextcloud_data:/var/www/html
      - ./docker/nc-hooks:/docker-entrypoint-hooks.d:ro
    ports:
      - "127.0.0.1:8080:80"
    networks:
      - default
      - lucidcove-net

  redis:
    image: redis:7-alpine@sha256:6ab0b6e7381779332f97b8ca76193e45b0756f38d4c0dcda72dbb3c32061ab99
    container_name: lucidcove-5680923f5af57bc3-redis
    restart: unless-stopped
    volumes:
      - redis_data:/data

  app:
    build:
      context: /Users/mymac/Documents/LucidCove/OpenSource/lucid-cove
      dockerfile: docker/Dockerfile
    image: lucid-cove:latest
    container_name: lucidcove-5680923f5af57bc3-app
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    user: "1000:1000"
    env_file:
      - .env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      COVE_MODE: multi
      COVE_ID: lucidcove-5680923f5af57bc3
      COVE_NAME: New Cove
      NEXTCLOUD_URL: http://lucidcove-5680923f5af57bc3-nextcloud:80
      NEXTCLOUD_ADMIN_USER: ${NC_ADMIN_USER}
      NEXTCLOUD_ADMIN_PASSWORD: ${NC_ADMIN_PASSWORD}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      LP_CADDY_ADMIN_TOKEN: ${LP_CADDY_ADMIN_TOKEN:-}
      PORT: 8200
      VOICE_INTERNAL_URL: http://lucidcove-5680923f5af57bc3-voice:8300
      VOICE_PORT: "8301"
      COVE_SHARED_CADDY: "1"
      COVE_CADDY_ADMIN: http://lucidcove-caddy:2019
      COVE_SHARED_CONFD: /app/shared-caddy-confd
      LP_TUNE_LOCK_DIR: /tune-lock
      COVE_MESH_IP: "100.64.0.2"
    volumes:
      - /Users/mymac/Documents/LucidCove/OpenSource/lucid-cove:/cove-core:ro
      - ./config:/app/config   # rw: runtime settings (domain, compute) persist to cove.yaml
      - app_data:/app/data
      - app_sites:/sites
      - app_sites:/app/data/sites
      - ${HOME}/.lucidcove/caddy/conf.d:/app/shared-caddy-confd   # rw: app writes its routing snippet
      - ${HOME}/.lucidcove/tune-lock:/tune-lock   # rw: cross-Cove tuning lock
    ports:
      - "127.0.0.1:8200:8200"
    networks:
      - default
      - lucidcove-net

  voice:
    build:
      context: /Users/mymac/Documents/LucidCove/OpenSource/lucid-cove/voice
      dockerfile: Dockerfile.cpu
    image: lucid-cove-voice:cpu
    container_name: lucidcove-5680923f5af57bc3-voice
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      NEXTCLOUD_URL: http://lucidcove-5680923f5af57bc3-nextcloud:80
      NEXTCLOUD_USER: ${NC_ADMIN_USER}
      NEXTCLOUD_PASSWORD: ${NC_ADMIN_PASSWORD}
      # GPU-share gate (CF-87/CF-78): batch transcription requires the Cove's own
      # app secret OR a verified renter grant — fresh installs no longer ship open.
      PIPECAT_INTERNAL_SECRET: ${PIPECAT_INTERNAL_SECRET:-}
      GPU_GRANT_VERIFY_URL: http://lucidcove-5680923f5af57bc3-app:8200
      ASR_ENGINE: whisper
      WHISPER_MODEL: small
    volumes:
      - voice_cache:/root/.cache
    ports:
      - "127.0.0.1:8301:8300"
    networks:
      - default
      - lucidcove-net

  dendrite-init:
    image: matrixdotorg/dendrite-monolith@sha256:7dafe6edfc8cfab758a68a4cf20414df1ade4a36b45b1852554d81fb70b1272c   # pinned by DIGEST (Dendrite 0.15.2, immutable) — supply-chain safe, avoids latest-drift
    container_name: lucidcove-5680923f5af57bc3-dendrite-init
    # Whole script as ONE arg to sh -c (a string `command:` here gets tokenized by
    # Compose and the shell would run bare `test` → exit 1). Generates the ed25519
    # signing key on first boot; no-op once it exists (key persists in the volume).
    entrypoint: ["/bin/sh", "-c", "test -f /var/dendrite/matrix_key.pem || /usr/bin/generate-keys --private-key /var/dendrite/matrix_key.pem"]
    restart: "no"
    volumes:
      - dendrite_data:/var/dendrite

  dendrite:
    image: matrixdotorg/dendrite-monolith@sha256:7dafe6edfc8cfab758a68a4cf20414df1ade4a36b45b1852554d81fb70b1272c   # pinned by DIGEST (Dendrite 0.15.2, immutable) — supply-chain safe, avoids latest-drift
    container_name: lucidcove-5680923f5af57bc3-dendrite
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      dendrite-init:
        condition: service_completed_successfully
    volumes:
      - ./docker/dendrite.yaml:/etc/dendrite/dendrite.yaml:ro
      - dendrite_data:/var/dendrite
    ports:
      - "127.0.0.1:8008:8008"
    networks:
      - default
      - lucidcove-net

volumes:
  postgres_data:
  nextcloud_data:
  app_data:
  app_sites:
  redis_data:
  voice_cache:
  dendrite_data:
networks:
  default:
  lucidcove-net:
    external: true
