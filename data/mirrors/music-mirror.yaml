meta:
  name: Music Mirror
  canon: Popular Music
  curator: Lucid Tuner
  version: 1
  type: music
  lens: Popular songs mapped to Lucid Principles through shared lyrical resonance. Each song carries a frequency — the music
    mirror reflects your tuning through songs you already know.
  description: Popular music mapped to Lucid Principles tuning combinations. Songs selected for lyrical and tonal resonance
    with each principle's teaching through the lens of each broadcast frequency.
pattern:
  peace:
    song:
      ref: Paul Simon — Patterns
      text: And it speaks to me in patterns / And it speaks to me in rhyme... I follow the pattern / I follow the pattern
        of my life
      thread: The lyric describes the moment of recognizing the automatic, unchosen structure that governs existence—seeing
        the "pattern" as an external force that shapes behavior, which mirrors the Canon's teaching that we are running survival
        programs we didn't write.
      artist: Paul Simon
      title: Patterns
      spotify_id: 0toeWzrcNdW4oaf7vgtWJM
      youtube_id: zYtkaZOI5eA
  clarity:
    song:
      ref: John Lennon — Working Class Hero
      text: Keep you doped with religion and sex and TV / And you think you're so clever and classless and free
      thread: Both trace the same mechanism—pain and pleasure conditioning from birth creates an invisible psychic structure
        that feels like freedom, and both capture the stark clarity of recognizing you were programmed to call your cage 'reality.
      artist: John Lennon
      title: Working Class Hero
      spotify_id: 1yKQBy7olMIqRpziyAzf8c
      youtube_id: D77dbv-xNfE
  momentum:
    song:
      ref: Bruce Springsteen — Badlands
      text: You spend your life waiting for a moment that just don't come / Don't waste your time waiting
      thread: Both articulate the realization that deferral and repetition are survival programs we mistake for living, and
        that breaking the pattern requires refusing to wait for external permission.
      artist: Bruce Springsteen
      title: Badlands
      spotify_id: 0M1YQiRGel1tTMjA3orfRd
      youtube_id: SDlSCeQXbPo
  trust:
    song:
      ref: 'Bon Iver — Re: Stacks'
      text: This is not the sound of a new man or crispy realization / It's the sound of the unlocking and the lift away
      thread: Both describe the slow discernment that the self is not a fixed identity but a construct of survival behaviors
        (the stacks we carry), and that true change comes not from forceful epiphany but from the gentle unlocking that follows
        recognition.
      artist: Bon Iver
      title: 'Re: Stacks'
      spotify_id: 20AC70RUlVz6A6dCcQ5tRS
      youtube_id: 3w68krri0bw
  joy:
    song:
      ref: The Lumineers — Stubborn Love
      text: It's better to feel pain, than nothing at all / The opposite of love's indifference
      thread: Recognizes the survival programming that numbs us to avoid pain, revealing that the 'safety' of indifference
        is the true prison; joy erupts in choosing to feel despite the risk.
      artist: The Lumineers
      title: Stubborn Love
      spotify_id: 4wG82w1L31yQhgGiWt6gIb
      youtube_id: MYXbL0xqXPc
  connection:
    song:
      ref: Rag'n'Bone Man — Human
      text: I'm only human, I make mistakes; I'm only human, that's all it takes to put the blame on me
      thread: Both articulate the biological programming we didn't write—our cells wired to avoid pain and deflect blame—and
        transform that limitation into a shared plea for compassion that dissolves judgment through mutual recognition.
      artist: Rag'n'Bone Man
      title: Human
      spotify_id: 58zsLZPvfflaiIbNWoA22O
      youtube_id: 52vehHn8KfQ
  presence:
    song:
      ref: Talking Heads — Once in a Lifetime
      text: And you may ask yourself, 'Well, how did I get here?' / Letting the days go by, let the water hold me down
      thread: Both capture the sudden vertigo of presence breaking through—realizing you've been unconsciously running a survival
        program ('letting the days go by') and finally witnessing in the thick now how your 'reality' is just a crystallized
        pattern you never chose.
      artist: Talking Heads
      title: Once in a Lifetime
      spotify_id: 1Tr4K5MU5XYE44umXGDndd
      youtube_id: CHatn3_UxEU
  resilience:
    song:
      ref: Simon & Garfunkel — Patterns
      text: And I circle to patterns / That I trusted as a boy / Simple paths of carbon / Simple lines of joy
      thread: Both trace how childhood survival mechanisms (simple paths devised to avoid pain and capture joy) crystallize
        into the unconscious cellular architecture we mistake for identity, requiring quiet endurance to recognize in the
        darkness.
      artist: Simon & Garfunkel
      title: Patterns
      spotify_id: 4UXEoEb1hOcOI8Fnz2sHlV
      youtube_id: ynOiwRy8YQc
  courage:
    song:
      ref: Simon & Garfunkel — The Sound of Silence
      text: And in the naked light I saw / Ten thousand people, maybe more / People talking without speaking / People hearing
        without listening
      thread: Both articulate the terrifying realization that we are collectively running unconscious survival programs—social
        patterns planted while we "slept"—that manufacture a false reality, requiring the courage to stand alone and name
        the silence that others fear to disturb.
      artist: Simon & Garfunkel
      title: The Sound of Silence
      spotify_id: 3YfS47QufnLDFA71FUsgCM
      youtube_id: bjkPQYWNTlg
  gratitude:
    song:
      ref: Alanis Morissette — Thank U
      text: How bout no longer being masochistic / Thank you disillusionment, thank you thank you silence
      thread: She catalogs the unconscious survival patterns she was running (masochism, overeating, chasing validation) and
        expresses gratitude for the disillusionment that revealed the structure of her own programming, recognizing that clarity
        emerges from the collapse of these old mechanisms.
      artist: Alanis Morissette
      title: Thank U
      spotify_id: 3CVDronuSnhguSUguPoseM
      youtube_id: lEkDK6wYu1Q
  release:
    song:
      ref: Bob Dylan — My Back Pages
      text: I was so much older then / I'm younger than that now
      thread: Both articulate the realization that the rigid ideological frameworks we adopt to navigate pain and pleasure
        are learned patterns that calcify into false maturity, and the liberation lies in releasing these binaries to recover
        a more fluid, authentic consciousness.
      artist: Bob Dylan
      title: My Back Pages
      spotify_id: 2bCFKT7w3wwGfCV3cjrjqi
      youtube_id: tx_hm7brW8M
  integration:
    song:
      ref: Talking Heads — Once in a Lifetime
      text: And you may find yourself living in a shotgun shack / And you may ask yourself, well, how did I get here?
      thread: Both articulate the sudden, vertiginous recognition that one's current reality is the accumulated result of
        unconscious programs (survival choices, societal flows, biological imperatives) that assembled themselves without
        conscious authorship, prompting the essential first step of seeing the mechanism before it can be changed.
      artist: Talking Heads
      title: Once in a Lifetime
      spotify_id: 1Tr4K5MU5XYE44umXGDndd
      youtube_id: CHatn3_UxEU
  boundary:
    song:
      ref: Kelly Clarkson — Because of You
      text: Because of you I never stray too far from the sidewalk / Because of you I learned to play on the safe side so
        I don't get hurt
      thread: The lyric articulates the exact mechanism of inherited survival programming—staying on the 'safe side' is the
        neural pattern carved by childhood pain, a boundary drawn so hard it becomes the lens of reality, requiring the recognition
        ('I will not make the same mistakes') before retuning is possible.
      artist: Kelly Clarkson
      title: Because of You
      spotify_id: 3f3omU8n47Mqyab5nCaGyT
      youtube_id: 49DL70klZjI
valley_of_shadows:
  peace:
    song:
      ref: Bon Iver — Holocene
      text: And at once I knew I was not magnificent / Hallowed be my name
      thread: Both capture the sudden, humbling realization that one's previous self-conception (the lens of belief/ego) was
        an obscuring illusion, accepted with a serene surrender rather than despair.
      artist: Bon Iver
      title: Holocene
      spotify_id: 35KiiILklye1JRRctaLUb4
      youtube_id: pvC5YD-IjL0
  clarity:
    song:
      ref: Rush — Freewill
      text: You can choose from phantom fears and kindness that can kill / I will choose a path that's clear / I will choose
        freewill
      thread: Both recognize that we view reality through constructed lenses of belief that generate 'phantom fears'—clouds
        of deception that obscure clear sight—and articulate the moment of clarity when one chooses to see through the mechanism
        rather than be ruled by it.
      artist: Rush
      title: Freewill
      spotify_id: 2XwYeBzumtjxVbFWwhJpsy
      youtube_id: V7bbdIU95zM
  momentum:
    song:
      ref: The Avett Brothers — Head Full of Doubt/Road Full of Promise
      text: There's a darkness upon me that's flooded in light / In the fine print they tell me what's wrong and what's right...
        Decide what to be and go be it
      thread: Both recognize that external forces ('fine print') create perceptual deception (darkness/light inversion), but
        the resolution isn't to wait for clarity—it's to accept the blindness and move forward through the valley by following
        the heart's direction.
      artist: The Avett Brothers
      title: Head Full of Doubt/Road Full of Promise
      spotify_id: 7Kho44itYaCQZvZQVV2SLW
      youtube_id: jyfeOyglMtI
  trust:
    song:
      ref: Bob Dylan — Mr. Tambourine Man
      text: Though I know that evening's empire has returned into sand / Vanished from my hand, left me blindly here to stand
        but still not sleeping
      thread: Both recognize that the structures we believe in (evening's empire/the lens) can dissolve into blindness and
        sand, yet the response is not despair but a willingness to follow the unseen music—the heart's cadence—when all navigational
        rules have vanished.
      artist: Bob Dylan
      title: Mr. Tambourine Man
      spotify_id: 3RkQ3UwOyPqpIiIvGVewuU
      youtube_id: m8tN2HgPH6I
  joy:
    song:
      ref: Johnny Nash — I Can See Clearly Now
      text: Gone are the dark clouds that had me blind / It's gonna be a bright, bright sun-shiny day
      thread: Both recognize that deceptive clouds (perceptual blindness) form to obscure vision and achievement, but while
        the Canon emphasizes walking through these illusions, Nash captures the triumphant burst of aliveness when clarity
        emerges—the spontaneous celebration of seeing through the lens without obstruction.
      artist: Johnny Nash
      title: I Can See Clearly Now
      spotify_id: 30SCXVFyQGOFMdKnbgJS18
      youtube_id: Qr2WF8dvjnY
  connection:
    song:
      ref: Joni Mitchell — Shadows and Light
      text: Every picture has its shadows / And it has some source of light... And I have seen the truth / And the truth is
        / We are one
      thread: Both songs trace how perception is constructed from dualities (shadows/light, beliefs/lens) that inherently
        blind us, yet both dissolve the loneliness of that blindness into the realization that separation is the final illusion—true
        sight is recognizing the shared field ("we are one").
      artist: Joni Mitchell
      title: Shadows and Light
      spotify_id: 1ERoCMfEtN8cs9Yru9leRi
      youtube_id: SSfWH6jWj5g
  presence:
    song:
      ref: Joni Mitchell — Shadows and Light
      text: Blindness you can keep on dealing / Fear is like a wilderland
      thread: Mitchell identifies the mechanism where 'blindness' filters perception (the lens of belief) and fear becomes
        the wild terrain to be walked through, mirroring the Canon's clouds that deceive and the valley of shadows itself.
      artist: Joni Mitchell
      title: Shadows and Light
      spotify_id: 1ERoCMfEtN8cs9Yru9leRi
      youtube_id: SSfWH6jWj5g
  resilience:
    song:
      ref: Simon & Garfunkel — The Boxer
      text: Still a man hears what he wants to hear / And disregards the rest
      thread: The lyric articulates the exact mechanism of belief-created perception where the mind filters reality to confirm
        its own assumptions, while the song's bruised narrator embodies resilience as the quiet, stubborn persistence of "the
        fighter still remains" despite the deceptive "pocketful of mumbles" that squandered his resistance.
      artist: Simon & Garfunkel
      title: The Boxer
      spotify_id: 76TZCvJ8GitQ2FA1q5dKu0
      youtube_id: C1VUWDcp5Sg
  courage:
    song:
      ref: Mumford & Sons — The Cave
      text: So come out of your cave walking on your hands / And see the world hanging upside down
      thread: Both trace Plato’s insight that belief constructs a false reality (shadows on the wall / clouds of deception),
        requiring the disorienting courage to invert one’s entire perspective and walk into the blinding unknown to find true
        sight.
      artist: Mumford & Sons
      title: The Cave
      spotify_id: 1JlssWnwFUiEzuSqw4H1V1
      youtube_id: HXc_R8ywI6A
  gratitude:
    song:
      ref: Gregory Alan Isakov — The Stable Song
      text: I threw stones at the stars, but the whole sky fell / Now I've found some grace
      thread: Both articulate how challenging the heavens with our limited perception causes a collapse of reality (the sky
        falling/valley of shadows), yet in that low place of humility (the stable), we discover unearned grace—treasuring
        what remains when illusions shatter.
      artist: Gregory Alan Isakov
      title: The Stable Song
      spotify_id: 3G9ETaH55bMQx8hwNhAgbU
      youtube_id: bqCRtvLxdHA
  release:
    song:
      ref: Florence + The Machine — Shake It Out
      text: So I got bored and left them there / They were just deadweight to me
      thread: Both recognize that the beliefs, obligations, and outdated associations we carry become a deadweight that obscures
        vision; the liberation comes not from refining the lens, but from releasing it entirely onto the shelf and walking
        forward with no thought of returning.
      artist: Florence + The Machine
      title: Shake It Out
      spotify_id: 4lY95OMGb9WxP6IYut64ir
      youtube_id: AHDED8S8CYI
  integration:
    song:
      ref: Leonard Cohen — Anthem
      text: Forget your perfect offering / There is a crack in everything / That's how the light gets in
      thread: Both recognize that our 'perfect offerings'—the rigid belief systems through which we conceive reality—create
        blind spots that block achievement, and that the very cracks in these lenses (the 'clouds that deceive') are paradoxically
        the necessary openings through which truth enters when we cease running from the summoned chaos.
      artist: Leonard Cohen
      title: Anthem
      spotify_id: 7aAE5KL20Uycf3dswsaHjp
      youtube_id: mkWmh6KJAXY
  boundary:
    song:
      ref: Florence + The Machine — Shake It Out
      text: Don't let it bring you down / It's only castles burning / Find someone who's turning / And you will come around
      thread: Both recognize that external chaos (burning castles, cold winds, dead men) and false structures create clouds
        of deception that threaten to distort your lens; the teaching is to walk through the valley without letting the external
        darkness become your internal truth—maintaining the boundary between what is happening around you and who you are.
      artist: Florence + The Machine
      title: Shake It Out
      spotify_id: 4lY95OMGb9WxP6IYut64ir
      youtube_id: AHDED8S8CYI
what_life_is_about:
  peace:
    song:
      ref: Pink Floyd — Breathe (In the Air)
      text: All you touch and all you see / Is all your life will ever be
      thread: Both articulate that the totality of existence is bounded by the individual's sensory/perceptual field, and
        recognizing this limitation as the complete definition of life dissolves the anxiety of seeking beyond one's own eyes.
      artist: Pink Floyd
      title: Breathe (In the Air)
      spotify_id: 2ctvdKmETyOzPb2GiJJT53
      youtube_id: _396y7Vk9NA
  clarity:
    song:
      ref: Louis Armstrong — What a Wonderful World
      text: I see trees of green, red roses too / I see them bloom for me and you
      thread: Both teach that the 'secret' is not in the world itself but in the act of seeing—Armstrong’s perspective doesn't
        just observe the wonder, it generates the 'for me and you' reality, identical to the Canon’s teaching that your point
        of view is the creative mechanism.
      artist: Louis Armstrong
      title: What a Wonderful World
      spotify_id: 29U7stRjqHU6rMiS8BfaI9
      youtube_id: fnyMzZiKfkY
  momentum:
    song:
      ref: Bruce Springsteen — Thunder Road
      text: You can hide 'neath your covers and study your pain / Or you can get out and show a little faith, there's magic
        in the night
      thread: The lyric presents two divergent perspectives on the same reality—retreating into fear versus recognizing possibility—and
        establishes that choosing the latter (your specific vision) is the secret mechanism that ignites forward motion, matching
        the Canon's teaching that your unique viewpoint is the engine, not the obstacle.
      artist: Bruce Springsteen
      title: Thunder Road
      spotify_id: 56lhDZNQ5J47aog6mGKeGk
      youtube_id: W2X0Gf9jfz8
  trust:
    song:
      ref: Pink Floyd — Breathe (In the Air)
      text: All you touch and all you see / Is all your life will ever be
      thread: Both lyrics identify the subjective field of perception not as a limitation but as the total mechanism of existence—your
        point of view literally constitutes your life, and realizing this dissolves the fear that you are missing some external
        secret.
      artist: Pink Floyd
      title: Breathe (In the Air)
      spotify_id: 2ctvdKmETyOzPb2GiJJT53
      youtube_id: _396y7Vk9NA
  joy:
    song:
      ref: Natasha Bedingfield — Unwritten
      text: Feel the rain on your skin, no one else can feel it for you / Only you can let it in... Today is where your book
        begins, the rest is still unwritten
      thread: Both articulate that the 'secret' of existence lies in the individual's unique perceptual instrument—your point
        of view is the only mechanism that can feel, write, or actualize your life, and recognizing this authorship is the
        liberation.
      artist: Natasha Bedingfield
      title: Unwritten
      spotify_id: 3U5JVgI2x4rDyHGObzJfNf
      youtube_id: iKejQrGq04w
  connection:
    song:
      ref: Brandi Carlile — The Story
      text: All of these lines across my face tell you the story of who I am... But these stories don't mean anything when
        you've got no one to tell them to
      thread: Both teach that your unique experiential perspective—the specific routes and scars that separate you from others—is
        actually the instrument of connection, finding its purpose only when witnessed by another.
      artist: Brandi Carlile
      title: The Story
      spotify_id: 0EKBV6GybPtALXUgWqWrym
      youtube_id: Kpp7wgKWYl0
  presence:
    song:
      ref: Pearl Jam — Present Tense
      text: Do you see the way that tree bends? / Does it inspire? / Leaning out to catch the sun's rays / A lesson to be
        applied
      thread: The lyric observes that the tree’s unique physical angle—its specific point of view—is the very mechanism by
        which it receives life (the sun), mirroring the Canon’s insight that one’s distinctive perspective is not a limitation
        but the instrument of reception and growth.
      artist: Pearl Jam
      title: Present Tense
      spotify_id: 679zqcQuKakOGI93NPCqB8
      youtube_id: uRWkx9QCp3Q
  resilience:
    song:
      ref: Frank Sinatra — My Way
      text: Regrets, I've had a few, but then again, too few to mention... I faced it all and I stood tall and did it my way
      thread: The lyric articulates that the secret of surviving a life of difficulty lies in claiming one's unique perspective
        as the instrument of navigation—the "way" being the individual point of view that allows one to stand tall despite
        the blows.
      artist: Frank Sinatra
      title: My Way
      spotify_id: 3spdoTYpuCpmq19tuD0bOe
      youtube_id: qQzdAsjWGPg
  courage:
    song:
      ref: Lynyrd Skynyrd — Simple Man
      text: Forget your lust for the rich man's gold / All that you need is in your soul
      thread: Both teach that the external world's promises (gold/fear) are distractions from the truth that your internal
        compass (soul/point of view) holds the secret to navigation, requiring the courage to trust that inner voice over
        societal pressure.
      artist: Lynyrd Skynyrd
      title: Simple Man
      spotify_id: 1ju7EsSGvRybSNEsRvc7qY
      youtube_id: l-5aPNxv-pU
  gratitude:
    song:
      ref: Grateful Dead — Ripple
      text: There is a road, no simple highway / That path is for your steps alone
      thread: The lyric reveals that your unique trajectory—unrepeatable by any other—*is* the secret highway of your life,
        and the accompanying gratitude ("If your cup is full may it be again") sanctifies that singular viewpoint as the instrument
        itself.
      artist: Grateful Dead
      title: Ripple
      spotify_id: 6PDAMw0YAGfO7ioXAgP2YW
      youtube_id: sFBQSx_xc2o
  release:
    song:
      ref: Mumford & Sons — The Cave
      text: So come out of your cave walking on your hands / And see the world hanging upside down
      thread: Both teach that salvation lies not in correcting your vision to match the world, but in trusting your inverted
        vantage point—releasing the burden of conventional sight reveals the secret mechanism of understanding.
      artist: Mumford & Sons
      title: The Cave
      spotify_id: 1JlssWnwFUiEzuSqw4H1V1
      youtube_id: HXc_R8ywI6A
  integration:
    song:
      ref: Grateful Dead — Eyes of the World
      text: Wake up to find out that you are the eyes of the world
      thread: Both teach that consciousness itself—your specific faculty of seeing—is the instrument of reality; the "secret"
        is realizing you are the perceiver creating the view, not a passive observer, and this waking-up is the integration
        of self and world.
      artist: Grateful Dead
      title: Eyes of the World
      spotify_id: 0qJ6owHt00MMZTpNmNsPHC
      youtube_id: hGjsYLlTxQ4
  boundary:
    song:
      ref: Pearl Jam — I Am Mine
      text: I know I was born and I know that I'll die / The in between is mine / I am mine
      thread: Both assert that the individual’s bounded life experience and perspective constitute a sovereign territory where
        meaning is created, not a limitation but the only domain one truly owns and must protect.
      artist: Pearl Jam
      title: I Am Mine
      spotify_id: 79pY2Z5eFvXMt9bSdHLrnA
      youtube_id: Js2_RrSO1MU
the_future:
  peace:
    song:
      ref: Fleetwood Mac — Landslide
      text: I've been afraid of changing / 'Cause I've built my life around you
      thread: Both identify the fear-based construction of reality (a life built around another/programmed like a machine)
        that creates repeating cycles of stagnation, and find the quiet courage to break the loop by accepting the flow of
        time and inevitable change.
      artist: Fleetwood Mac
      title: Landslide
      spotify_id: 5ihS6UUlyQAfmp48eSkxuQ
      youtube_id: mXonGAEPQp8
  clarity:
    song:
      ref: Bob Marley & The Wailers — Redemption Song
      text: Emancipate yourselves from mental slavery / None but ourselves can free our minds
      thread: Both articulate the realization that we are conditioned by invisible systems (mental slavery/programming) and
        that breaking historical cycles requires an internal awakening to reclaim agency.
      artist: Bob Marley & The Wailers
      title: Redemption Song
      spotify_id: 7MKcM6TfaGKQVFfhstCbOw
      youtube_id: 1A95dcLxAuA
  momentum:
    song:
      ref: David Bowie — Changes
      text: So I turned myself to face me / But I've never caught a glimpse / Of how the others must see the faker / Or the
        name I used to be
      thread: Both trace the moment of catching yourself performing a programmed role (the 'faker,' the 'machine') and the
        disorienting momentum required to turn inward and break the loop of 'dead-end streets' that no longer satisfy.
      artist: David Bowie
      title: Changes
      spotify_id: 0LrwgdLsFaWh9VXIjBRe8t
      youtube_id: 7fdhI3qUdSs
  trust:
    song:
      ref: Florence + The Machine — Shake It Out
      text: Regrets collect like old friends / Here to relive your darkest moments... And it's hard to dance with a devil
        on your back / So shake him off
      thread: Both identify how past patterns mechanically repeat (regrets as 'old friends,' the devil on your back), but
        realize that breaking the cycle requires not fighting harder than the programming—instead surrendering to the unknown
        with 'ready to suffer and ready to hope,' trusting the release.
      artist: Florence + The Machine
      title: Shake It Out
      spotify_id: 4lY95OMGb9WxP6IYut64ir
      youtube_id: AHDED8S8CYI
  joy:
    song:
      ref: Stevie Wonder — Higher Ground
      text: Teachers keep on teachin' / Preachers keep on preachin' / World keep on turnin' / 'Cause it won't be too long...
        Sleepers just stop sleepin' / 'Cause it won't be too long
      thread: Both recognize that we are caught in repetitive cycles of societal and spiritual programming (teachers, preachers,
        the world's deception) and celebrate the awakening that allows us to transcend these loops and consciously choose
        a higher path forward.
      artist: Stevie Wonder
      title: Higher Ground
      spotify_id: 0dMd4rilfd6gPbXaLpNYhu
      youtube_id: 1esf0efHbjM
  connection:
    song:
      ref: Crosby, Stills, Nash & Young — Woodstock
      text: We are stardust, we are golden, and we've got to get ourselves back to the garden
      thread: Both recognize that humanity has fallen from its true nature into repeating cycles of history and division,
        and that breaking the loop requires a collective awakening to return to our shared origin.
      artist: Crosby, Stills, Nash & Young
      title: Woodstock
      spotify_id: 2iqKVzMZpyUVPwxIVaQkhm
      youtube_id: 4lx86B6a3kc
  presence:
    song:
      ref: David Bowie — Changes
      text: So I turned myself to face me / But I've never caught a glimpse / Of how the others must see the faker / I'm much
        too fast to take that test
      thread: The lyric captures the startling moment of present-moment self-examination that reveals the "faker" (the programmed,
        mechanical self) and the necessity of becoming a "different man" to break the cycle of "dead-end streets," mirroring
        the Canon's teaching that waking up to one's own automation is the mechanism for shattering historical repetition.
      artist: David Bowie
      title: Changes
      spotify_id: 0LrwgdLsFaWh9VXIjBRe8t
      youtube_id: 7fdhI3qUdSs
  resilience:
    song:
      ref: John Lennon — Working Class Hero
      text: As soon as you're born they make you feel small / By giving you no time instead of it all / Till the pain is so
        big you feel nothing at all
      thread: Both reveal how systemic institutions (family, education, church) program individuals from birth into compliant,
        numb subjects through calculated diminishment and distraction, yet the resilient act of enduring and articulating
        this violence ("a working class hero is something to be") becomes the crack in the machine that allows consciousness
        to break the loop.
      artist: John Lennon
      title: Working Class Hero
      spotify_id: 1yKQBy7olMIqRpziyAzf8c
      youtube_id: D77dbv-xNfE
