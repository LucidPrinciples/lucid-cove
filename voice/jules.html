<title>jules</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,-apple-system,sans-serif;background:#0a0a0f;color:#e0e0e0;min-height:100vh;min-height:100dvh;padding:0;margin:0;overflow:hidden;display:flex;flex-direction:column}

/* ── Header: avatar + branding centered ── */
header{padding:18px 20px 12px;display:flex;flex-direction:column;align-items:center;gap:6px;border-bottom:1px solid #1a1a2e;flex-shrink:0;position:relative}
.avatar{width:96px;height:96px;border-radius:50%;background:linear-gradient(135deg,#3a3a5c,#1a1a2e);border:2px solid #333;display:flex;align-items:center;justify-content:center;cursor:pointer;-webkit-tap-highlight-color:transparent}
.brand{font-size:0.85rem;color:#666;font-weight:400;letter-spacing:0.5px}
.brand em{font-style:normal;color:#7eb8da}
.header-right{position:absolute;top:14px;right:16px;display:flex;align-items:center;gap:10px}
header .status{font-size:0.7rem;color:#666}
.queue-badge{background:#f39c12;color:#0a0a0f;font-size:0.7rem;font-weight:700;padding:2px 7px;border-radius:10px;cursor:pointer;display:none}
.queue-badge:hover{background:#e67e22}

/* ── Transcript area ── */
.transcript-area{flex:1 1 0;min-height:0;overflow-y:auto;padding:16px 20px;-webkit-overflow-scrolling:touch}
.transcript-area:empty::before{content:"tap the mic and start talking.";color:#444;font-style:italic;display:block;text-align:center;margin-top:40px;font-size:0.9rem}

.segment{margin-bottom:12px;padding:10px 14px;background:#111118;border-radius:8px;border-left:3px solid #333;line-height:1.6;font-size:0.95rem}
.segment .time{font-size:0.7rem;color:#555;margin-bottom:4px}
.segment.pending{border-left-color:#f39c12;opacity:0.7}
.segment .text{white-space:pre-wrap;word-wrap:break-word}
.segment .text[contenteditable]{outline:none;cursor:text}
.segment .text[contenteditable]:focus{background:rgba(126,184,218,0.05);border-radius:4px}

.word-count{font-size:0.7rem;color:#555;text-align:center;padding:4px;flex-shrink:0}

/* ── Mic controls ── */
.controls{padding:16px 20px;display:flex;align-items:center;justify-content:center;flex-shrink:0}

.mic-btn{width:88px;height:88px;border-radius:50%;border:3px solid #333;background:#1a1a2e;color:#888;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.2s;flex-shrink:0}
.mic-btn svg{width:34px;height:34px;fill:currentColor}
.mic-btn.recording{border-color:#e74c3c;background:#2a1a1e;color:#e74c3c;box-shadow:0 0 25px rgba(231,76,60,0.3);animation:pulse 1.5s infinite}
.mic-btn.processing{border-color:#f39c12;background:#2a2a1e;color:#f39c12;pointer-events:none}
@keyframes pulse{0%,100%{box-shadow:0 0 25px rgba(231,76,60,0.3)}50%{box-shadow:0 0 45px rgba(231,76,60,0.5)}}


/* ── Status bar ── */
.status-bar{flex-shrink:0;padding:6px 16px;padding-bottom:max(8px,env(safe-area-inset-bottom))}
.save-status{font-size:0.8rem;color:#2ecc71;text-align:center;min-height:22px;padding:4px 0}

/* Queue panel */
.queue-panel{display:none;border-top:1px solid #1a1a2e;max-height:45vh;overflow-y:auto;flex-shrink:0}
.queue-panel.show{display:block}
.queue-header{display:flex;align-items:center;justify-content:space-between;padding:10px 16px;background:#111118}
.queue-header h2{font-size:0.85rem;color:#7eb8da}
.queue-header .btn{padding:6px 14px;font-size:0.8rem;border:1px solid #333;border-radius:8px;cursor:pointer;background:#1a1a2e;color:#ccc}
.queue-item{display:flex;align-items:center;gap:10px;padding:10px 16px;border-bottom:1px solid #1a1a2e}
.queue-item .qi-info{flex:1;min-width:0}
.queue-item .qi-date{font-size:0.75rem;color:#555}
.queue-item .qi-duration{font-size:0.8rem;color:#ccc}
.queue-item .qi-status{font-size:0.75rem;color:#f39c12}
.queue-item .qi-actions{display:flex;gap:6px;flex-shrink:0}
.queue-item .qi-actions button{background:#1a1a2e;border:1px solid #333;border-radius:6px;padding:4px 10px;font-size:0.75rem;color:#ccc;cursor:pointer}
.queue-item .qi-actions button:hover{background:#252540}
.queue-item .qi-actions button.del{color:#e74c3c;border-color:#e74c3c}
.queue-item.processing{opacity:0.6}
.queue-empty{padding:20px;text-align:center;color:#444;font-size:0.85rem;font-style:italic}
</style>

<script>
const micBtn = document.getElementById("micBtn");
const connStatus = document.getElementById("connStatus");
const transcriptEl = document.getElementById("transcript");
const wordCountEl = document.getElementById("wordCount");
const saveStatus = document.getElementById("saveStatus");
const queueBadge = document.getElementById("queueBadge");
const queuePanel = document.getElementById("queuePanel");
const queueList = document.getElementById("queueList");
const processAllBtn = document.getElementById("processAllBtn");

let ws, mediaStream, audioCtx, processor;
let mediaRecorder = null;
let audioChunks = [];
let recording = false;
let processing = false;
let pendingAutoSave = false;
let chunkTimer = null;  // periodic end_audio for live transcription chunks
let autoSaveTimeout = null;
let needsSave = false;  // backup flag — guarantees doSave fires after stop
let segments = [];
let segmentCounter = 0;
let connected = false;
let recordingStartTime = null;
let lastAudioBlob = null;  // holds audio from most recent recording for Save
let wakeLock = null;        // Screen Wake Lock — keeps screen on during recording

// ── Presence routing (multi-Presence mode) ─────────────────
// MC passes ?presence=username for per-Presence vault routing.
// If absent, uses filesystem fallback (single-Presence / operator mode).
const _params = new URLSearchParams(window.location.search);
const PRESENCE_ID = _params.get("presence") || "";

// ── IndexedDB for offline queue ────────────────────────────

const DB_NAME = "jules-queue";
const DB_VERSION = 1;
const STORE_NAME = "recordings";

function openDB() {
  return new Promise((resolve, reject) => {
    const req = indexedDB.open(DB_NAME, DB_VERSION);
    req.onupgradeneeded = (e) => {
      const db = e.target.result;
      if (!db.objectStoreNames.contains(STORE_NAME)) {
        db.createObjectStore(STORE_NAME, { keyPath: "id", autoIncrement: true });
      }
    };
    req.onsuccess = () => resolve(req.result);
    req.onerror = () => reject(req.error);
  });
}

async function queueRecording(blob, durationSec) {
  const db = await openDB();
  return new Promise((resolve, reject) => {
    const tx = db.transaction(STORE_NAME, "readwrite");
    tx.objectStore(STORE_NAME).add({
      audio: blob,
      date: new Date().toISOString(),
      duration: durationSec,
      status: "pending"
    });
    tx.oncomplete = () => { resolve(); updateQueueBadge(); };
    tx.onerror = () => reject(tx.error);
  });
}

async function getQueue() {
  const db = await openDB();
  return new Promise((resolve, reject) => {
    const tx = db.transaction(STORE_NAME, "readonly");
    const req = tx.objectStore(STORE_NAME).getAll();
    req.onsuccess = () => resolve(req.result);
    req.onerror = () => reject(req.error);
  });
}

async function deleteQueueItem(id) {
  const db = await openDB();
  return new Promise((resolve, reject) => {
    const tx = db.transaction(STORE_NAME, "readwrite");
    tx.objectStore(STORE_NAME).delete(id);
    tx.oncomplete = () => { resolve(); updateQueueBadge(); };
    tx.onerror = () => reject(tx.error);
  });
}

async function updateQueueBadge() {
  const items = await getQueue();
  const pending = items.filter(i => i.status === "pending").length;
  if (pending > 0) {
    queueBadge.textContent = pending;
    queueBadge.style.display = "inline";
  } else {
    queueBadge.style.display = "none";
  }
}

// ── Queue panel UI ─────────────────────────────────────────

function toggleQueue() {
  queuePanel.classList.toggle("show");
  if (queuePanel.classList.contains("show")) renderQueue();
}

async function renderQueue() {
  const items = await getQueue();
  if (items.length === 0) {
    queueList.innerHTML = '<div class="queue-empty">No queued recordings</div>';
    processAllBtn.disabled = true;
    return;
  }
  processAllBtn.disabled = !connected;
  queueList.innerHTML = items.map(item => {
    const d = new Date(item.date);
    const dateStr = d.toLocaleDateString([], { month: "short", day: "numeric" });
    const timeStr = d.toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" });
    const dur = item.duration ? Math.round(item.duration) + "s" : "?";
    const statusText = item.status === "pending" ? "" : item.status;
    return `<div class="queue-item" id="qi-${item.id}">
      <div class="qi-info">
        <div class="qi-date">${dateStr} ${timeStr}</div>
        <div class="qi-duration">${dur} audio</div>
        ${statusText ? `<div class="qi-status">${statusText}</div>` : ""}
      </div>
      <div class="qi-actions">
        ${connected && item.status === "pending" ? `<button onclick="processOne(${item.id})">Process</button>` : ""}
        <button class="del" onclick="removeItem(${item.id})">Del</button>
      </div>
    </div>`;
  }).join("");
}

async function removeItem(id) {
  await deleteQueueItem(id);
  renderQueue();
}

async function processOne(id) {
  const items = await getQueue();
  const item = items.find(i => i.id === id);
  if (!item) return;

  const el = document.getElementById(`qi-${id}`);
  if (el) {
    el.classList.add("processing");
    const statusEl = el.querySelector(".qi-status");
    if (statusEl) statusEl.textContent = "Transcribing...";
    else {
      const info = el.querySelector(".qi-info");
      info.insertAdjacentHTML("beforeend", '<div class="qi-status">Transcribing...</div>');
    }
  }

  try {
    const formData = new FormData();
    formData.append("audio", item.audio, "recording.webm");
    if (PRESENCE_ID) formData.append("presence_id", PRESENCE_ID);

    const resp = await fetch("/api/transcribe-and-save", {
      method: "POST",
      body: formData
    });
    const data = await resp.json();

    if (data.ok) {
      await deleteQueueItem(id);
    } else {
      if (el) {
        const s = el.querySelector(".qi-status");
        if (s) { s.textContent = data.error || "Failed"; s.style.color = "#e74c3c"; }
      }
    }
  } catch (e) {
    if (el) {
      const s = el.querySelector(".qi-status");
      if (s) { s.textContent = "Network error"; s.style.color = "#e74c3c"; }
    }
  }
  renderQueue();
}

async function processQueue() {
  const items = await getQueue();
  const pending = items.filter(i => i.status === "pending");
  processAllBtn.disabled = true;
  processAllBtn.textContent = `Processing (0/${pending.length})...`;

  for (let i = 0; i < pending.length; i++) {
    processAllBtn.textContent = `Processing (${i + 1}/${pending.length})...`;
    await processOne(pending[i].id);
  }

  processAllBtn.textContent = "Process All";
  processAllBtn.disabled = false;
  updateQueueBadge();
}

// ── WebSocket ──────────────────────────────────────────────

function connect() {
  const proto = location.protocol === "https:" ? "wss:" : "ws:";
  ws = new WebSocket(proto + "//" + location.host + "/ws");
  ws.binaryType = "arraybuffer";

  ws.onopen = () => {
    connected = true;
    connStatus.textContent = "ready";
    connStatus.style.color = "#2ecc71";
    // If we're still recording when WS reconnects, resume streaming
    if (recording && mediaStream) resumeStreaming();
  };
  ws.onclose = () => {
    connected = false;
    connStatus.textContent = "offline";
    connStatus.style.color = "#e74c3c";
    setTimeout(connect, 3000);
  };
  ws.onerror = () => {};

  ws.onmessage = (e) => {
    if (typeof e.data !== "string") return;
    try {
      const msg = JSON.parse(e.data);
      handleMessage(msg);
    } catch (ex) {}
  };
}

function handleMessage(msg) {
  switch (msg.type) {
    case "connected":
      break;
    case "processing":
      processing = true;
      if (!recording) micBtn.classList.add("processing");  // don't override recording state
      break;
    case "transcript":
      if (msg.text) addSegment(msg.text);
      if (recording) addPending();  // re-show pending indicator while still recording
      break;
    case "silence":
      if (!recording) removePending();
      break;
    case "done":
      processing = false;
      if (!recording) micBtn.classList.remove("processing");
      if (!recording) removePending();
      if (autoSaveTimeout) { clearTimeout(autoSaveTimeout); autoSaveTimeout = null; }
      if (pendingAutoSave) {
        pendingAutoSave = false;
        doSave();
      }
      break;
    case "error":
      processing = false;
      micBtn.classList.remove("processing");
      removePending();
      if (autoSaveTimeout) { clearTimeout(autoSaveTimeout); autoSaveTimeout = null; }
      connStatus.textContent = msg.message || "Error";
      connStatus.style.color = "#e74c3c";
      // Still save on error — don't lose the recording
      if (pendingAutoSave) {
        pendingAutoSave = false;
        doSave();
      }
      setTimeout(() => {
        connStatus.textContent = connected ? "Ready" : "Offline";
        connStatus.style.color = connected ? "#2ecc71" : "#e74c3c";
      }, 3000);
      break;
  }
}

// ── Wake Lock (prevent screen dim during recording) ───────

async function acquireWakeLock() {
  if (!("wakeLock" in navigator)) return;
  try {
    wakeLock = await navigator.wakeLock.request("screen");
    wakeLock.addEventListener("release", () => { wakeLock = null; });
  } catch (e) { /* wake lock denied or unavailable — recording still works, just might dim */ }
}

function releaseWakeLock() {
  if (wakeLock) { wakeLock.release(); wakeLock = null; }
}

// Re-acquire wake lock when page becomes visible again (Android restores tab)
document.addEventListener("visibilitychange", () => {
  if (document.visibilityState === "visible" && recording && !wakeLock) {
    acquireWakeLock();
  }
});

// ── Audio recording ────────────────────────────────────────

async function startRecording() {
  recording = true;
  recordingStartTime = Date.now();
  micBtn.classList.add("recording");
  saveStatus.textContent = "";
  if (connected) addPending();
  acquireWakeLock();

  try {
    mediaStream = await navigator.mediaDevices.getUserMedia({
      audio: { sampleRate: 16000, channelCount: 1, echoCancellation: true, noiseSuppression: true }
    });

    // MediaRecorder — always captures audio for the queue
    audioChunks = [];
    try {
      mediaRecorder = new MediaRecorder(mediaStream, { mimeType: "audio/webm;codecs=opus" });
    } catch (e) {
      mediaRecorder = new MediaRecorder(mediaStream);
    }
    mediaRecorder.ondataavailable = (e) => {
      if (e.data.size > 0) audioChunks.push(e.data);
    };
    mediaRecorder.start(1000); // chunk every second

    // PCM streaming to server (only when connected)
    if (connected && ws && ws.readyState === 1) {
      // Tell server this is Jules transcription mode
      ws.send(JSON.stringify({ type: "start_recording", mode: "transcribe" }));
      audioCtx = new (window.AudioContext || window.webkitAudioContext)({ sampleRate: 16000 });
      const src = audioCtx.createMediaStreamSource(mediaStream);
      processor = audioCtx.createScriptProcessor(4096, 1, 1);
      processor.onaudioprocess = (e) => {
        if (!recording || !ws || ws.readyState !== 1) return;
        const f32 = e.inputBuffer.getChannelData(0);
        const i16 = new Int16Array(f32.length);
        for (let i = 0; i < f32.length; i++) {
          let s = Math.max(-1, Math.min(1, f32[i]));
          i16[i] = s < 0 ? s * 0x8000 : s * 0x7FFF;
        }
        ws.send(i16.buffer);
      };
      src.connect(processor);
      processor.connect(audioCtx.destination);

      // Start periodic chunking — send end_audio every 5s for live transcript feedback
      // Server transcribes buffered audio, clears buffer, new frames keep flowing
      chunkTimer = setInterval(() => {
        if (recording && ws && ws.readyState === 1 && !processing) {
          ws.send(JSON.stringify({ type: "end_audio", mode: "transcribe" }));
        }
      }, 5000);
    }
  } catch (err) {
    connStatus.textContent = "Mic error: " + err.message;
    connStatus.style.color = "#e74c3c";
    stopRecording();
  }
}

function resumeStreaming() {
  // Reconnect PCM streaming to an already-running mic session
  if (!ws || ws.readyState !== 1 || !mediaStream) return;
  try {
    ws.send(JSON.stringify({ type: "start_recording", mode: "transcribe" }));
    if (processor) { processor.disconnect(); processor = null; }
    if (audioCtx) { audioCtx.close().catch(()=>{}); audioCtx = null; }
    audioCtx = new (window.AudioContext || window.webkitAudioContext)({ sampleRate: 16000 });
    const src = audioCtx.createMediaStreamSource(mediaStream);
    processor = audioCtx.createScriptProcessor(4096, 1, 1);
    processor.onaudioprocess = (e) => {
      if (!recording || !ws || ws.readyState !== 1) return;
      const f32 = e.inputBuffer.getChannelData(0);
      const i16 = new Int16Array(f32.length);
      for (let i = 0; i < f32.length; i++) {
        let s = Math.max(-1, Math.min(1, f32[i]));
        i16[i] = s < 0 ? s * 0x8000 : s * 0x7FFF;
      }
      ws.send(i16.buffer);
    };
    src.connect(processor);
    processor.connect(audioCtx.destination);
    addPending();
    connStatus.textContent = "reconnected";
    connStatus.style.color = "#2ecc71";
  } catch(e) { console.error("Resume streaming error:", e); }
}

function stopRecording() {
  recording = false;
  const durationSec = recordingStartTime ? (Date.now() - recordingStartTime) / 1000 : 0;
  recordingStartTime = null;
  micBtn.classList.remove("recording");
  releaseWakeLock();

  // Stop chunk timer
  if (chunkTimer) { clearInterval(chunkTimer); chunkTimer = null; }

  // Stop PCM streaming
  if (processor) { processor.disconnect(); processor = null; }
  if (audioCtx) { audioCtx.close(); audioCtx = null; }

  // Stop MediaRecorder — save audio blob
  if (mediaRecorder && mediaRecorder.state !== "inactive") {
    const wasConnected = connected;
    const mimeType = mediaRecorder.mimeType || "audio/webm";
    // Build blob NOW from chunks we already have so Save can use it immediately
    if (audioChunks.length > 0) {
      lastAudioBlob = new Blob(audioChunks, { type: mimeType });
    }
    mediaRecorder.onstop = async () => {
      // Update blob with any final data, then queue if offline
      if (audioChunks.length > 0) {
        const blob = new Blob(audioChunks, { type: mimeType });
        lastAudioBlob = blob;
        if (!wasConnected) {
          await queueRecording(blob, durationSec);
        }
        audioChunks = [];
      }
      mediaRecorder = null;
    };
    mediaRecorder.stop();
  }

  // Stop mic
  if (mediaStream) { mediaStream.getTracks().forEach(t => t.stop()); mediaStream = null; }

  // Send end_audio for live transcription (if connected)
  needsSave = true;
  if (connected && ws && ws.readyState === 1) {
    micBtn.classList.add("processing");
    pendingAutoSave = true;
    ws.send(JSON.stringify({ type: "end_audio", mode: "transcribe" }));

    // Safety net: if "done" never arrives (WS flaky, server slow), save anyway
    autoSaveTimeout = setTimeout(() => {
      if (pendingAutoSave) {
        console.warn("Auto-save timeout — saving with what we have");
        pendingAutoSave = false;
        processing = false;
        micBtn.classList.remove("processing");
        removePending();
        doSave();
      }
    }, 5000);
  } else {
    // Offline or no WS — save immediately with whatever we have
    pendingAutoSave = false;
    if (segments.length > 0 || lastAudioBlob) {
      doSave();
    }
  }

  // Guaranteed backup — if doSave still hasn't fired after 10s, force it
  setTimeout(() => {
    if (needsSave && !recording && segments.length > 0) {
      console.warn("Backup save — normal save path did not fire");
      pendingAutoSave = false;
      processing = false;
      micBtn.classList.remove("processing");
      doSave();
    }
  }, 10000);
}

function toggleRecording() {
  if (processing) return;
  if (recording) {
    stopRecording();
  } else {
    startRecording();
  }
}

// ── Transcript management ──────────────────────────────────

function addPending() {
  const div = document.createElement("div");
  div.className = "segment pending";
  div.id = "pending-segment";
  div.innerHTML = `<div class="time">${timeStr()}</div><div class="text">Listening...</div>`;
  transcriptEl.appendChild(div);
  transcriptEl.scrollTop = transcriptEl.scrollHeight;
}

function removePending() {
  const el = document.getElementById("pending-segment");
  if (el) el.remove();
}

function addSegment(text) {
  removePending();
  const id = ++segmentCounter;
  const ts = timeStr();
  segments.push({ text, timestamp: ts, id });

  const div = document.createElement("div");
  div.className = "segment";
  div.dataset.id = id;
  div.innerHTML = `<div class="time">${ts}</div><div class="text" contenteditable="true">${escHtml(text)}</div>`;

  const textEl = div.querySelector(".text");
  textEl.addEventListener("blur", () => {
    const seg = segments.find(s => s.id === id);
    if (seg) seg.text = textEl.textContent;
    updateWordCount();
    saveDraft();
  });

  transcriptEl.appendChild(div);
  transcriptEl.scrollTop = transcriptEl.scrollHeight;

  updateWordCount();
  saveDraft();
}

function resetPage() {
  segments = [];
  segmentCounter = 0;
  transcriptEl.innerHTML = "";
  saveStatus.textContent = "";
  lastAudioBlob = null;
  updateWordCount();
  clearDraft();
}


function updateWordCount() {
  const total = segments.reduce((n, s) => n + s.text.split(/\s+/).filter(Boolean).length, 0);
  wordCountEl.textContent = total > 0 ? `${total} words` : "";
}

function getFullTranscript() {
  return segments.map(s => s.text).join("\n\n");
}

// ── Save ───────────────────────────────────────────────────

async function doSave() {
  needsSave = false;
  saveStatus.textContent = "Saving...";
  saveStatus.style.color = "#f39c12";

  const text = getFullTranscript();
  const wordCount = text.split(/\s+/).filter(Boolean).length;
  const ts = new Date().toISOString().slice(0,16).replace("T","_").replace(":","");
  const baseName = `jules-${ts}`;

  // Fallback: if real-time transcription is thin but we have substantial audio,
  // send the webm to the file-based transcription endpoint instead.
  // This catches WebSocket drops, buffer issues, and partial transcriptions.
  // Threshold: audio > 200KB (~10+ seconds) AND transcript < 5 words.
  // Previous threshold (50KB/15 words) was too aggressive — short valid
  // recordings triggered fallback unnecessarily.
  const blobSizeKB = lastAudioBlob ? lastAudioBlob.size / 1024 : 0;
  const useFileFallback = lastAudioBlob && blobSizeKB > 200 && wordCount < 5;

  try {
    if (useFileFallback) {
      // File-based transcription — server transcribes full webm + saves both files
      saveStatus.textContent = "Re-transcribing...";
      const formData = new FormData();
      formData.append("audio", lastAudioBlob, "recording.webm");
      formData.append("filename", baseName);
      if (PRESENCE_ID) formData.append("presence_id", PRESENCE_ID);
      const resp = await fetch("/api/transcribe-and-save", { method: "POST", body: formData });
      const data = await resp.json();
      lastAudioBlob = null;

      if (data.ok) {
        saveStatus.textContent = "saved (re-transcribed)";
        saveStatus.style.color = "#2ecc71";
        clearDraft();
        return;
      } else {
        saveStatus.textContent = data.error || "Transcription error";
        saveStatus.style.color = "#e74c3c";
      }
    } else {
      // Normal path — real-time segments are good, save them directly
      const saveBody = { text, filename: baseName };
      if (PRESENCE_ID) saveBody.presence_id = PRESENCE_ID;
      const resp = await fetch("/api/save-to-vault", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(saveBody)
      });
      const data = await resp.json();

      // Save audio alongside transcript
      if (lastAudioBlob) {
        const formData = new FormData();
        formData.append("audio", lastAudioBlob, "recording.webm");
        formData.append("filename", baseName.replace(/\.md$/, "") + ".webm");
        if (PRESENCE_ID) formData.append("presence_id", PRESENCE_ID);
        await fetch("/api/save-audio", { method: "POST", body: formData });
        lastAudioBlob = null;
      }

      if (data.ok) {
        saveStatus.textContent = "saved";
        saveStatus.style.color = "#2ecc71";
        clearDraft();
        return;
      } else {
        saveStatus.textContent = data.error || "Error";
        saveStatus.style.color = "#e74c3c";
      }
    }
  } catch (e) {
    console.error("doSave error:", e);
    saveStatus.textContent = "Save error: " + (e.message || "network");
    saveStatus.style.color = "#e74c3c";
  }
}

function resetAfterSave() {
  // Clean reset without page reload — avoids stale draft popup loop
  segments = [];
  segmentCounter = 0;
  transcriptEl.innerHTML = "";
  updateWordCount();
  setTimeout(() => {
    saveStatus.textContent = "";
  }, 3000);
}

// ── Helpers ─────────────────────────────────────────────────

function timeStr() {
  return new Date().toLocaleTimeString([], { hour: "2-digit", minute: "2-digit", second: "2-digit" });
}
function escHtml(s) {
  const d = document.createElement("div"); d.textContent = s; return d.innerHTML;
}

// ── Draft system (disabled — offline backup not reliable) ───

function saveDraft() {}  // no-op
function clearDraft() {
  try { localStorage.removeItem("jules-draft"); } catch(e) {}
}

function checkDraft() {
  try {
    const raw = localStorage.getItem(DRAFT_KEY);
    if (!raw) return;
    const draft = JSON.parse(raw);
    if (!draft.segments || draft.segments.length === 0) return;
    const age = Date.now() - (draft.saved || 0);
    if (age > 24 * 60 * 60 * 1000) { clearDraft(); return; } // expire after 24h
    const wordCount = draft.segments.reduce((n, s) => n + s.text.split(/\s+/).filter(Boolean).length, 0);
    const when = new Date(draft.saved).toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" });
    if (confirm(`Recovered unsaved draft (${wordCount} words from ${when}). Restore it?`)) {
      draft.segments.forEach(s => {
        const id = ++segmentCounter;
        segments.push({ text: s.text, timestamp: s.timestamp, id });
        const div = document.createElement("div");
        div.className = "segment";
        div.dataset.id = id;
        div.innerHTML = `<div class="time">${escHtml(s.timestamp)}</div><div class="text" contenteditable="true">${escHtml(s.text)}</div>`;
        const textEl = div.querySelector(".text");
        textEl.addEventListener("blur", () => {
          const seg = segments.find(x => x.id === id);
          if (seg) seg.text = textEl.textContent;
          updateWordCount(); saveDraft();
        });
        transcriptEl.appendChild(div);
      });
      updateWordCount();
    } else {
      clearDraft();
    }
  } catch(e) { clearDraft(); }
}

// ── Init ────────────────────────────────────────────────────

connect();
updateQueueBadge();
clearDraft();  // clear any stale draft on load
</script>
</body>
