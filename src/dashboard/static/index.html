<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Mission Control</title>
<link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
<link rel="icon" type="image/png" sizes="32x32" href="/static/favicon-32.png">
<link rel="apple-touch-icon" sizes="180x180" href="/static/apple-touch-icon.png">
<link rel="manifest" href="/static/manifest.json">
<meta name="theme-color" content="#0a0a0f">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<link rel="stylesheet" href="/static/css/dashboard.css">
<link rel="stylesheet" href="/static/css/components.css">
<link rel="stylesheet" href="/static/css/chat.css">
<link rel="stylesheet" href="/static/css/action-board.css">
<link rel="stylesheet" href="/static/css/tune-flow.css">
</head>
<body>
<div id="app">

  <!-- Header — populated from /api/config -->
  <header class="mc-header">
    <div class="header-left">
      <div class="cove-logo" id="header-logo"></div>
      <div class="agent-symbol" id="header-symbol"></div>
      <div class="header-info">
        <div class="header-name" id="header-name">Loading...</div>
        <div class="header-sub" id="header-status"></div>
      </div>
    </div>
    <div class="header-right">
      <button class="board-switch" id="board-switch" onclick="switchBoard()" title="Switch board">
        <span class="board-switch-icon" id="board-switch-icon">⚡</span>
        <span class="board-switch-label" id="board-switch-label">Action</span>
      </button>
      <button class="help-btn" onclick="openHelp()" title="Help">?</button>
      <div class="status-dot mobile-hide" id="conn-dot" title="Connection"></div>
      <div class="freq-badge" id="header-freq" onclick="if(typeof openOperatorTuning==='function')openOperatorTuning()" style="cursor:pointer" title="Open Tuning">&mdash;</div>
    </div>
  </header>

  <!-- Help Modal -->
  <div class="help-overlay" id="help-overlay" onclick="closeHelp()">
    <div class="help-modal" onclick="event.stopPropagation()">
      <div class="help-modal-header">
        <span class="help-modal-title">Help</span>
        <button class="help-close" onclick="closeHelp()">&times;</button>
      </div>
      <div class="help-modal-body" id="help-modal-body">
        <!-- Filled by openHelp() / helpShowPage() in core.js (#HELP1) -->
      </div>
    </div>
  </div>

  <!-- Tab Bar — built dynamically from config -->
  <nav class="tab-bar" id="tab-bar"></nav>

  <!-- Panel Container — panels injected by tab scripts -->
  <main class="panel-container" id="panel-container"></main>

</div>

<!-- Core bootstrap — loads config, builds tabs, loads scripts -->
<script src="/static/js/lp-colors.js"></script>
<script src="/static/js/core-datetime.js"></script>
<script src="/static/js/panels.js"></script>
<script src="/static/js/core.js"></script>
</body>
</html>
