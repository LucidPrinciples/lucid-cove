<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Transcript Editor — Video Pipeline</title>
<link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
<link rel="icon" type="image/png" sizes="32x32" href="/static/favicon-32.png">
<link rel="apple-touch-icon" sizes="180x180" href="/static/apple-touch-icon.png">
<link rel="manifest" href="/static/manifest.json">
<meta name="theme-color" content="#0a0a0f">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #0a0a0f; color: #d8d8e0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; padding: 20px; }

.header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; padding-bottom: 12px; border-bottom: 1px solid #222; }
.header h1 { font-size: 18px; font-weight: 600; color: #5ce1e6; }
.header-actions { display: flex; gap: 10px; align-items: center; }
.header a { color: #5ce1e6; text-decoration: none; font-size: 13px; }

.video-meta { display: flex; gap: 20px; margin-bottom: 16px; font-size: 13px; color: #888; flex-wrap: wrap; }
.video-meta span { display: flex; align-items: center; gap: 5px; }
.video-meta .label { color: #666; }
.video-meta .value { color: #aaa; }
.video-link { color: #5ce1e6; text-decoration: none; font-weight: 600; }
.video-link:hover { text-decoration: underline; }

/* Trim bar */
.trim-bar { display: flex; gap: 12px; align-items: center; margin-bottom: 16px; padding: 10px 14px; background: #111118; border: 1px solid #1e1e2a; border-radius: 8px; flex-wrap: wrap; }
.trim-bar label { font-size: 12px; color: #888; }
.trim-bar input[type="text"] { background: #1a1a24; border: 1px solid #2a2a3a; color: #d8d8e0; border-radius: 4px; padding: 5px 8px; width: 70px; font-size: 13px; font-family: monospace; }
.trim-bar input[type="text"]:focus { border-color: #5ce1e6; outline: none; }
.trim-preview { font-size: 11px; color: #666; }
.trim-preview strong { color: #aaa; }

/* Toolbar */
.toolbar { display: flex; gap: 10px; align-items: center; margin-bottom: 16px; padding: 10px 14px; background: #111118; border: 1px solid #1e1e2a; border-radius: 8px; flex-wrap: wrap; }
.toolbar-group { display: flex; gap: 6px; align-items: center; }
.toolbar-group::after { content: ''; width: 1px; height: 20px; background: #2a2a3a; margin-left: 4px; }
.toolbar-group:last-child::after { display: none; }

.btn-tool { background: #1a1a24; border: 1px solid #2a2a3a; color: #aaa; border-radius: 6px; padding: 6px 12px; font-size: 12px; cursor: pointer; transition: all 0.15s; white-space: nowrap; }
.btn-tool:hover { background: #222230; border-color: #3a3a4a; color: #d8d8e0; }
.btn-tool.active { background: rgba(92, 225, 230, 0.15); border-color: rgba(92, 225, 230, 0.3); color: #5ce1e6; }
.btn-tool.danger { color: #ff7070; }
.btn-tool.danger:hover { background: rgba(255, 80, 80, 0.15); border-color: rgba(255, 80, 80, 0.3); }

.filler-count { font-size: 11px; color: #888; padding: 0 4px; }
.edit-stats { font-size: 11px; color: #666; margin-left: auto; }
.edit-stats strong { color: #aaa; }

/* Word grid */
.word-grid { background: #111118; border: 1px solid #1e1e2a; border-radius: 10px; padding: 20px; line-height: 2.2; min-height: 200px; }

.time-marker { display: inline-block; color: #5ce1e6; font-size: 10px; font-weight: 700; font-family: monospace; background: rgba(92, 225, 230, 0.08); border: 1px solid rgba(92, 225, 230, 0.15); border-radius: 3px; padding: 1px 5px; margin: 0 4px 0 2px; vertical-align: middle; user-select: none; cursor: default; }
.time-marker.minute { background: rgba(92, 225, 230, 0.12); border-color: rgba(92, 225, 230, 0.25); }

.word {
    display: inline-block;
    padding: 2px 3px;
    margin: 1px;
    border-radius: 3px;
    cursor: text;
    border: 1px solid transparent;
    transition: background 0.1s, border-color 0.1s;
    font-size: 15px;
    line-height: 1.4;
    min-width: 8px;
    outline: none;
}
.word:hover { background: rgba(255, 255, 255, 0.04); border-color: #2a2a3a; }
.word:focus { background: rgba(92, 225, 230, 0.08); border-color: rgba(92, 225, 230, 0.3); }
.word.edited { color: #7aeaee; }
.word.filler { color: #ff9050; opacity: 0.6; text-decoration: line-through; text-decoration-color: rgba(255, 144, 80, 0.3); }
.word.filler.highlight { background: rgba(255, 144, 80, 0.12); border-color: rgba(255, 144, 80, 0.25); opacity: 1; }
.word.deleted { display: none; }
.word.selected { background: rgba(92, 225, 230, 0.15); border-color: rgba(92, 225, 230, 0.4); }

/* Paragraph breaks — visual gap where silence > 2s */
.para-break { display: block; height: 12px; }

/* Bottom action bar */
.action-bar { position: sticky; bottom: 0; background: #0a0a0f; border-top: 1px solid #222; padding: 16px 0; margin-top: 24px; display: flex; justify-content: space-between; align-items: center; gap: 12px; }
.action-bar-left { display: flex; gap: 10px; align-items: center; }
.action-bar-right { display: flex; gap: 10px; align-items: center; }

.btn-save { background: #1a1a24; border: 1px solid #2a2a3a; color: #d8d8e0; border-radius: 8px; padding: 10px 20px; font-size: 14px; font-weight: 600; cursor: pointer; transition: all 0.15s; }
.btn-save:hover { background: #222230; border-color: #3a3a4a; }

.btn-primary { background: #5ce1e6; color: #0a0a0f; border: none; border-radius: 8px; padding: 10px 24px; font-size: 14px; font-weight: 700; cursor: pointer; transition: all 0.15s; }
.btn-primary:hover { background: #7aeaee; }
.btn-primary:disabled { background: #333; color: #666; cursor: not-allowed; }

.save-status { font-size: 12px; color: #666; }
.save-status.saving { color: #e6b43c; }
.save-status.saved { color: #5ce1e6; }
.save-status.error { color: #ff5050; }

/* Loading */
.loading { text-align: center; padding: 60px 20px; color: #666; font-size: 14px; }
.error { text-align: center; padding: 60px 20px; color: #ff5050; font-size: 14px; }

/* Undo toast */
.undo-toast { position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%); background: #222230; border: 1px solid #3a3a4a; border-radius: 8px; padding: 10px 16px; font-size: 13px; color: #d8d8e0; display: none; z-index: 100; box-shadow: 0 4px 20px rgba(0,0,0,0.5); }
.undo-toast a { color: #5ce1e6; text-decoration: none; margin-left: 8px; font-weight: 600; cursor: pointer; }

/* Selection info bar */
.selection-info { position: fixed; bottom: 80px; right: 20px; background: #1a1a24; border: 1px solid #2a2a3a; border-radius: 8px; padding: 8px 14px; font-size: 12px; color: #888; display: none; z-index: 100; }
.selection-info strong { color: #5ce1e6; }
</style>
</head>
<body>

<div class="header">
    <h1>Transcript Editor</h1>
    <div class="header-actions">
        <a href="/static/action-board/full-video-pipeline.html?embedded=1" class="back-pipeline">← Pipeline</a>
    </div>
</div>
<script>
if (window.location.search.includes('embedded=1'))
    document.querySelector('.back-pipeline')?.remove();
</script>

<div id="video-meta" class="video-meta"></div>

<div id="trim-bar" class="trim-bar" style="display:none">
    <label>Trim:</label>
    <label>Start at</label>
    <input type="text" id="trim-start" placeholder="0:00" value="0:00" />
    <label>End at</label>
    <input type="text" id="trim-end" placeholder="22:00" />
    <button class="btn-tool" onclick="applyTrim()">Trim</button>
    <span class="trim-preview" id="trim-preview"></span>
</div>

<div id="toolbar" class="toolbar" style="display:none">
    <div class="toolbar-group">
        <button class="btn-tool" id="btn-highlight-fillers" onclick="toggleFillerHighlight()">Show Fillers</button>
        <button class="btn-tool danger" id="btn-remove-fillers" onclick="removeAllFillers()">Remove Fillers</button>
        <span class="filler-count" id="filler-count"></span>
    </div>
    <div class="toolbar-group">
        <button class="btn-tool" onclick="undoLast()">Undo</button>
        <button class="btn-tool" onclick="resetAll()">Reset All</button>
    </div>
    <div class="toolbar-group">
        <button class="btn-tool" id="btn-show-deleted" onclick="toggleShowDeleted()">Show Deleted</button>
    </div>
    <span class="edit-stats" id="edit-stats"></span>
</div>

<div id="word-grid" class="loading">Loading transcript...</div>

<div id="action-bar" class="action-bar" style="display:none">
    <div class="action-bar-left">
        <span class="save-status" id="save-status"></span>
    </div>
    <div class="action-bar-right">
        <button class="btn-save" onclick="saveTranscript(false)">Save</button>
        <button class="btn-primary" onclick="saveTranscript(true)">Save & Analyze Moments</button>
    </div>
</div>

<div class="undo-toast" id="undo-toast">
    <span id="undo-msg"></span>
    <a onclick="undoLast()">Undo</a>
</div>

<div class="selection-info" id="selection-info"></div>

<script>
const params = new URLSearchParams(window.location.search);
const stem = params.get('stem') || '';
const presenceName = params.get('presence') || 'operator';

// -- State --
let originalSegments = [];  // pristine copy from server
let segments = [];          // working copy: [{text, start, end, idx, deleted, edited, originalText}]
let undoStack = [];         // [{action, data}]
let fillerHighlight = false;
let showDeleted = false;
let totalDuration = 0;

// Filler patterns
const FILLERS = new Set(['um', 'uh', 'uhm', 'uhh', 'umm', 'hmm', 'mm', 'mhm', 'ah', 'er']);
const FILLER_PHRASES_START = ['you know', 'i mean', 'like,', 'so,', 'basically,', 'right,', 'right?'];

function isFiller(text) {
    const clean = text.replace(/[.,!?;:]+$/, '').toLowerCase().trim();
    return FILLERS.has(clean);
}

// -- Load --
async function loadTranscript() {
    const grid = document.getElementById('word-grid');
    if (!stem) {
        grid.innerHTML = '<div class="error">No video stem specified. Add ?stem=VIDEO_NAME to URL.</div>';
        return;
    }
    try {
        const resp = await fetch(`/api/video/transcript/${stem}`);
        if (!resp.ok) {
            grid.innerHTML = `<div class="error">Transcript not found for "${stem}".</div>`;
            return;
        }
        const data = await resp.json();
        renderMeta(data);
        initSegments(data.segments || []);
        renderGrid();
        document.getElementById('trim-bar').style.display = 'flex';
        document.getElementById('toolbar').style.display = 'flex';
        document.getElementById('action-bar').style.display = 'flex';
    } catch (e) {
        grid.innerHTML = `<div class="error">Failed to load: ${e.message}</div>`;
    }
}

function renderMeta(data) {
    const meta = document.getElementById('video-meta');
    const dur = data.audio_duration_seconds || 0;
    const wordCount = (data.segments || []).length;
    // Link to full-res source video in processing/ (preview isn't built until after trimming)
    const sourceFile = data.source_file || '';
    const originalFilename = sourceFile.split('/').pop() || `${stem}.MOV`;

    meta.innerHTML = `
        <span><a class="video-link" href="/api/video/proxy/stream?filename=${encodeURIComponent(originalFilename)}" target="_blank">Watch Video ↗</a></span>
        <span><span class="label">Duration:</span> <span class="value">${fmtTime(dur)}</span></span>
        <span><span class="label">Words:</span> <span class="value">${wordCount.toLocaleString()}</span></span>
        <span><span class="label">Model:</span> <span class="value">${data.model || '?'}</span></span>
        <span><span class="label">Speed:</span> <span class="value">${data.realtime_factor || '?'}x realtime</span></span>
    `;

    // Set trim end to video duration
    document.getElementById('trim-end').value = fmtTime(dur);
    totalDuration = dur;
}

function initSegments(segs) {
    originalSegments = JSON.parse(JSON.stringify(segs));
    segments = segs.map((s, i) => ({
        text: s.text,
        start: s.start,
        end: s.end,
        idx: i,
        deleted: false,
        edited: false,
        originalText: s.text,
    }));
}

// -- Render --
function renderGrid() {
    const grid = document.getElementById('word-grid');
    grid.className = 'word-grid';

    let html = '';
    let lastTimeSec = -999;
    let lastEnd = 0;

    for (const seg of segments) {
        // Paragraph break on >2s silence
        if (seg.start - lastEnd > 2.0 && lastEnd > 0) {
            html += '<span class="para-break"></span>';
        }

        // Time marker every ~10 seconds
        const sec = Math.floor(seg.start);
        if (sec - lastTimeSec >= 10) {
            const isMinute = sec % 60 === 0 && sec > 0;
            html += `<span class="time-marker${isMinute ? ' minute' : ''}">${fmtTime(seg.start)}</span>`;
            lastTimeSec = sec;
        }

        const classes = ['word'];
        if (seg.deleted) classes.push('deleted');
        if (seg.edited) classes.push('edited');
        if (isFiller(seg.text)) {
            classes.push('filler');
            if (fillerHighlight) classes.push('highlight');
        }
        if (showDeleted && seg.deleted) {
            // Override display:none when showing deleted
            classes.push('show-deleted');
        }

        html += `<span class="${classes.join(' ')}" `
            + `data-idx="${seg.idx}" `
            + `contenteditable="true" `
            + `spellcheck="false" `
            + `onblur="onWordBlur(event)" `
            + `onkeydown="onWordKey(event)" `
            + `onfocus="onWordFocus(event)" `
            + `${showDeleted && seg.deleted ? 'style="display:inline-block;opacity:0.25;text-decoration:line-through;"' : ''}`
            + `>${esc(seg.text)}</span>`;

        lastEnd = seg.end;
    }

    grid.innerHTML = html;
    updateStats();
}

// -- Word interaction --
function onWordFocus(e) {
    const idx = parseInt(e.target.dataset.idx);
    const seg = segments[idx];
    if (!seg) return;
    // Show selection info
    const info = document.getElementById('selection-info');
    info.innerHTML = `<strong>${fmtTimePrecise(seg.start)}</strong> — <strong>${fmtTimePrecise(seg.end)}</strong> · word ${idx + 1}/${segments.length}`;
    info.style.display = 'block';
}

function onWordBlur(e) {
    const el = e.target;
    const idx = parseInt(el.dataset.idx);
    const seg = segments[idx];
    if (!seg) return;

    const newText = el.textContent.trim();

    // If emptied, treat as delete
    if (!newText) {
        pushUndo('edit', { idx, oldText: seg.text, wasDeleted: seg.deleted });
        seg.deleted = true;
        seg.text = seg.originalText; // preserve original for undo
        renderGrid();
        showToast(`Deleted "${seg.originalText}"`);
        return;
    }

    // If changed
    if (newText !== seg.text) {
        pushUndo('edit', { idx, oldText: seg.text, wasDeleted: false, wasEdited: seg.edited });
        seg.text = newText;
        seg.edited = (newText !== seg.originalText);
        el.className = el.className.replace(' edited', '');
        if (seg.edited) el.classList.add('edited');
        updateStats();
    }

    document.getElementById('selection-info').style.display = 'none';
}

function onWordKey(e) {
    const el = e.target;
    const idx = parseInt(el.dataset.idx);

    if (e.key === 'Delete' || e.key === 'Backspace') {
        // If content is already empty or word is highlighted fully, delete the word
        const sel = window.getSelection();
        const text = el.textContent;
        if (!text.trim() || (sel.toString() === text)) {
            e.preventDefault();
            const seg = segments[idx];
            pushUndo('edit', { idx, oldText: seg.text, wasDeleted: seg.deleted });
            seg.deleted = true;
            renderGrid();
            showToast(`Deleted "${seg.originalText}"`);
            return;
        }
    }

    if (e.key === 'Tab') {
        e.preventDefault();
        // Move to next/prev word
        const dir = e.shiftKey ? -1 : 1;
        let next = idx + dir;
        while (next >= 0 && next < segments.length && segments[next].deleted) next += dir;
        if (next >= 0 && next < segments.length) {
            const nextEl = document.querySelector(`[data-idx="${next}"]`);
            if (nextEl) nextEl.focus();
        }
    }

    if (e.key === 'Enter') {
        e.preventDefault(); // no line breaks inside words
    }

    // Ctrl+Z / Cmd+Z
    if ((e.ctrlKey || e.metaKey) && e.key === 'z') {
        e.preventDefault();
        undoLast();
    }
}

// -- Trim --
function parseTime(str) {
    const parts = str.trim().split(':');
    if (parts.length === 2) return parseInt(parts[0]) * 60 + parseFloat(parts[1]);
    return parseFloat(str);
}

function applyTrim() {
    const startTime = parseTime(document.getElementById('trim-start').value);
    const endTime = parseTime(document.getElementById('trim-end').value);

    if (isNaN(startTime) || isNaN(endTime)) return;

    const toDelete = segments
        .filter(s => !s.deleted && (s.end <= startTime || s.start >= endTime))
        .map(s => s.idx);

    if (toDelete.length === 0) {
        document.getElementById('trim-preview').innerHTML = 'Nothing to trim';
        return;
    }

    pushUndo('bulk-delete', { indices: toDelete });
    toDelete.forEach(idx => { segments[idx].deleted = true; });
    renderGrid();

    const remaining = segments.filter(s => !s.deleted);
    const newStart = remaining.length ? fmtTime(remaining[0].start) : '?';
    const newEnd = remaining.length ? fmtTime(remaining[remaining.length - 1].end) : '?';
    showToast(`Trimmed ${toDelete.length} words — now ${newStart} to ${newEnd}`);
}

// -- Filler operations --
function toggleFillerHighlight() {
    fillerHighlight = !fillerHighlight;
    document.getElementById('btn-highlight-fillers').classList.toggle('active', fillerHighlight);
    renderGrid();
}

function removeAllFillers() {
    const fillerIdxs = segments
        .filter(s => !s.deleted && isFiller(s.text))
        .map(s => s.idx);

    if (fillerIdxs.length === 0) return;

    pushUndo('bulk-delete', { indices: fillerIdxs });

    fillerIdxs.forEach(idx => { segments[idx].deleted = true; });
    renderGrid();
    showToast(`Removed ${fillerIdxs.length} filler words`);
}

function toggleShowDeleted() {
    showDeleted = !showDeleted;
    document.getElementById('btn-show-deleted').classList.toggle('active', showDeleted);
    renderGrid();
}

// -- Undo --
function pushUndo(action, data) {
    undoStack.push({ action, data });
    if (undoStack.length > 100) undoStack.shift();
}

function undoLast() {
    if (undoStack.length === 0) return;
    const entry = undoStack.pop();

    if (entry.action === 'edit') {
        const seg = segments[entry.data.idx];
        seg.text = entry.data.oldText;
        seg.deleted = entry.data.wasDeleted || false;
        seg.edited = entry.data.wasEdited || (entry.data.oldText !== seg.originalText);
    } else if (entry.action === 'bulk-delete') {
        entry.data.indices.forEach(idx => { segments[idx].deleted = false; });
    }

    renderGrid();
    showToast('Undone');
}

function resetAll() {
    if (!confirm('Reset all edits? This cannot be undone.')) return;
    initSegments(originalSegments);
    undoStack = [];
    renderGrid();
    showToast('All edits reset');
}



// -- Save --
async function saveTranscript(andAnalyze) {
    const status = document.getElementById('save-status');
    status.textContent = 'Saving...';
    status.className = 'save-status saving';

    // Build edited segments array — only non-deleted, preserving timestamps
    const editedSegments = segments
        .filter(s => !s.deleted)
        .map(s => ({ text: s.text, start: s.start, end: s.end }));

    // Build full text from remaining words
    const fullText = editedSegments.map(s => s.text).join(' ');

    try {
        const resp = await fetch(`/api/video/transcript/${stem}`, {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                segments: editedSegments,
                text: fullText,
                presence_name: presenceName,
            }),
        });

        if (!resp.ok) {
            const err = await resp.json().catch(() => ({}));
            throw new Error(err.error || `Save failed (${resp.status})`);
        }

        status.textContent = 'Saved';
        status.className = 'save-status saved';

        // Full-video preview generation REMOVED (operator decision 2026-07-03): the
        // transcript sliders ARE the cut-line reference now; the low-res preview
        // render was a whole extra ffmpeg pass per video. The original stays one
        // click away (Watch Video ↗ header link; moments-review links it too).
        // Shorts previews for scheduling review are a different mechanism, untouched.

        if (andAnalyze) {
            status.textContent = 'Analyzing moments...';
            status.className = 'save-status saving';

            // A14: analysis runs as a BACKGROUND JOB (a long local-brain pass 504'd
            // the held-open request). Kick /start, poll every 5s.
            const startResp = await fetch('/api/video/analyze/start', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ stem, presence_name: presenceName }),
            });
            const sd = await startResp.json().catch(() => ({}));
            if (!startResp.ok || !sd.job_id) {
                throw new Error(sd.error || `Analysis failed to start (${startResp.status})`);
            }
            const job = await pollVideoJob(sd.job_id);
            if (job.state !== 'done') {
                // #5b: surface the per-tier detail the job carries, not just a generic line.
                const detail = job.error || (job.result && job.result.error) || 'Analysis failed';
                throw new Error(detail);
            }
            const result = job.result || {};
            const momentCount = (result.moments || []).length;
            status.textContent = `${momentCount} moments found — redirecting...`;
            status.className = 'save-status saved';

            // Pass moments data to review page via sessionStorage
            // so it doesn't need to re-fetch (avoids filesystem race condition)
            try { sessionStorage.setItem(`moments_${stem}`, JSON.stringify(result)); } catch(e) {}

            // Navigate to moments review
            setTimeout(() => {
                const embedded = window.location.search.includes('embedded=1') ? '&embedded=1' : '';
                window.location.href = `/static/action-board/video-moments-review.html?stem=${stem}${embedded}`;
            }, 1500);
        }
    } catch (e) {
        status.textContent = e.message;
        status.className = 'save-status error';
    }
}

// A14: poll a background video job until done/failed. Every 5s; a transient fetch
// error keeps polling so a blip doesn't abort a long analysis.
async function pollVideoJob(jobId, intervalMs = 5000) {
    while (true) {
        await new Promise(r => setTimeout(r, intervalMs));
        try {
            const r = await fetch('/api/video/jobs/' + jobId);
            if (!r.ok) continue;
            const j = await r.json();
            if (j.state === 'done' || j.state === 'failed') return j;
        } catch (e) { /* transient — keep polling */ }
    }
}

// -- Stats --
function updateStats() {
    const total = segments.length;
    const deleted = segments.filter(s => s.deleted).length;
    const edited = segments.filter(s => s.edited && !s.deleted).length;
    const fillers = segments.filter(s => !s.deleted && isFiller(s.text)).length;

    document.getElementById('edit-stats').innerHTML =
        `<strong>${total - deleted}</strong> words · ${edited} edited · ${deleted} removed`;
    document.getElementById('filler-count').textContent =
        fillers > 0 ? `${fillers} found` : '';
}

// -- Toast --
function showToast(msg) {
    const toast = document.getElementById('undo-toast');
    document.getElementById('undo-msg').textContent = msg;
    toast.style.display = 'block';
    clearTimeout(toast._timer);
    toast._timer = setTimeout(() => { toast.style.display = 'none'; }, 4000);
}

// -- Helpers --
function fmtTime(s) {
    if (s == null) return '?';
    const m = Math.floor(s / 60);
    const sec = Math.floor(s % 60);
    return `${m}:${sec.toString().padStart(2, '0')}`;
}

function fmtTimePrecise(s) {
    if (s == null) return '?';
    const m = Math.floor(s / 60);
    const sec = (s % 60).toFixed(1);
    return `${m}:${sec.padStart(4, '0')}`;
}

function esc(s) {
    if (!s) return '';
    const d = document.createElement('div');
    d.textContent = s;
    return d.innerHTML;
}

loadTranscript();
</script>
